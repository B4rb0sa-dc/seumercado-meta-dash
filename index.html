<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --meta-blue: #0866ff;
      --meta-blue-dark: #075bd8;
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --line: #dfe3eb;
      --line-soft: #edf0f5;
      --text: #1c2b33;
      --muted: #667085;
      --green: #12b76a;
      --red: #f04438;
      --orange: #f79009;
      --shadow: 0 2px 10px rgba(16, 24, 40, 0.08);
      --radius: 12px;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    select,
    input {
      font-family: inherit;
    }

    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--meta-blue);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      line-height: 1.1;
    }

    .brand-subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      height: 38px;
      padding: 0 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--surface-2);
    }

    .btn-primary {
      background: var(--meta-blue);
      color: #ffffff;
      border-color: var(--meta-blue);
    }

    .btn-primary:hover {
      background: var(--meta-blue-dark);
      border-color: var(--meta-blue-dark);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .container {
      max-width: 1420px;
      margin: 0 auto;
      padding: 20px 18px 56px;
    }

    .page-heading {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .page-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .manager-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .manager-tabs {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 10px 12px 0;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      overflow-x: auto;
    }

    .tab-button {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 12px 14px 11px;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }

    .tab-button.active {
      color: var(--meta-blue);
      border-bottom-color: var(--meta-blue);
    }

    .toolbar {
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(220px, 1.35fr) 180px 180px auto;
      gap: 10px;
      align-items: end;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    select,
    input[type="date"] {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      background: #ffffff;
      color: var(--text);
    }

    .context-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }

    .crumb {
      border: none;
      background: transparent;
      padding: 0;
      color: var(--meta-blue);
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
    }

    .crumb.current {
      color: var(--text);
      cursor: default;
    }

    .context-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 14px 0;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .metric-helper {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
    }

    .table-title {
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
    }

    .table-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 620px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1280px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line-soft);
      padding: 12px 10px;
      font-size: 13px;
      vertical-align: middle;
      text-align: left;
    }

    th {
      background: #f5f6f7;
      color: #475467;
      font-weight: 900;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    tbody tr {
      background: #ffffff;
    }

    tbody tr:hover {
      background: #f5f9ff;
    }

    tbody tr.clickable-row {
      cursor: pointer;
    }

    .sort-button {
      border: none;
      background: transparent;
      padding: 0;
      font: inherit;
      font-weight: 900;
      color: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .sort-indicator {
      color: var(--meta-blue);
      font-size: 11px;
    }

    .entity-cell {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      min-width: 260px;
      align-items: center;
    }

    .check-square {
      width: 16px;
      height: 16px;
      border: 1px solid #98a2b3;
      border-radius: 4px;
      background: #ffffff;
    }

    .entity-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .entity-name {
      font-weight: 900;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 420px;
    }

    .entity-id {
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
      word-break: break-all;
    }

    .drill-icon {
      color: var(--meta-blue);
      font-weight: 900;
      flex: 0 0 auto;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-active {
      color: #067647;
      background: #dcfae6;
    }

    .status-inactive {
      color: #b42318;
      background: #fee4e2;
    }

    .status-missing {
      color: #475467;
      background: #eaecf0;
    }

    .delivery {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: #344054;
      font-weight: 700;
    }

    .delivery-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      display: inline-block;
    }

    .delivery-dot.off {
      background: #98a2b3;
    }

    .numeric {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .ai-analysis-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 16px;
      overflow: hidden;
    }

    .ai-analysis-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      border-bottom: 1px solid var(--line);
    }

    .ai-analysis-title {
      margin: 0 0 4px;
      font-size: 17px;
      font-weight: 900;
    }

    .ai-analysis-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .ai-analysis-output {
      padding: 16px;
      line-height: 1.65;
      color: #344054;
      font-size: 14px;
      white-space: pre-line;
      background: #fbfcfe;
      min-height: 86px;
    }

    .loading,
    .error {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: #b42318;
    }

    .empty-state {
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .topbar {
        height: auto;
        align-items: flex-start;
        gap: 12px;
        padding: 12px;
        flex-direction: column;
      }

      th {
        top: 0;
      }

      .container {
        padding: 14px 10px 40px;
      }

      .page-heading,
      .ai-analysis-header,
      .table-header {
        flex-direction: column;
      }

      .topbar-actions,
      .topbar-actions .btn,
      .ai-analysis-header .btn {
        width: 100%;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .metric-value {
        font-size: 21px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">f</div>
      <div>
        <h1 class="brand-title">Meta Ads Dashboard</h1>
        <p class="brand-subtitle">Leitura por campanha, conjunto e anúncio</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="btn" onclick="resetNavigation()">Ver campanhas</button>
      <button class="btn btn-primary" onclick="loadDashboard()">Atualizar dados</button>
    </div>
  </header>

  <main class="container">
    <div class="page-heading">
      <div>
        <h2 class="page-title">Gerenciador de anúncios</h2>
        <p class="page-copy">Clique em uma campanha para ver seus conjuntos. Depois, clique em um conjunto para ver os anúncios relacionados.</p>
      </div>
    </div>

    <div id="dashboard">
      <div class="loading">Carregando dados...</div>
    </div>
  </main>

  <script>
    let dashboardData = null;
    let currentPeriod = "last_7d";
    let currentCustomStart = "";
    let currentCustomEnd = "";
    let currentView = "campaign";
    let selectedCampaign = null;
    let selectedAdset = null;
    let currentVisibleItems = [];
    let currentAIContext = null;

    let sortState = {
      key: "spend",
      direction: "desc"
    };

    const LEVEL_CONFIG = {
      campaign: {
        label: "Campanhas",
        singular: "Campanha",
        title: "Campanhas",
        subtitle: "Clique em uma campanha para abrir somente os conjuntos dessa campanha.",
        nextLabel: "Ver conjuntos",
        nameKeys: ["campaign_name", "Campaign Name", "Campaign"],
        idKeys: ["campaign_id", "Campaign ID"]
      },
      adset: {
        label: "Conjuntos",
        singular: "Conjunto",
        title: "Conjuntos de anúncios",
        subtitle: "Clique em um conjunto para abrir somente os anúncios desse conjunto.",
        nextLabel: "Ver anúncios",
        nameKeys: ["adset_name", "Adset Name", "Ad Set Name", "Adset"],
        idKeys: ["adset_id", "Adset ID", "Ad Set ID"]
      },
      ad: {
        label: "Anúncios",
        singular: "Anúncio",
        title: "Anúncios",
        subtitle: "Anúncios filtrados conforme a campanha e o conjunto selecionados.",
        nextLabel: "",
        nameKeys: ["ad_name", "Ad Name", "Ad"],
        idKeys: ["ad_id", "Ad ID"]
      }
    };

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;

      if (typeof value === "object" && value.value !== undefined) return toNumber(value.value);
      if (typeof value === "object" && value.Value !== undefined) return toNumber(value.Value);
      if (typeof value === "number") return value;

      let text = String(value)
        .replace("R$", "")
        .replace("%", "")
        .replace(/\s/g, "")
        .trim();

      if (!text) return 0;

      const hasComma = text.includes(",");
      const hasDot = text.includes(".");

      if (hasComma && hasDot) {
        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma > lastDot) {
          text = text.replace(/\./g, "").replace(",", ".");
        } else {
          text = text.replace(/,/g, "");
        }
      } else if (hasComma) {
        text = text.replace(",", ".");
      }

      return Number(text) || 0;
    }

    function formatMoney(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatNumber(value) {
      return Math.round(toNumber(value)).toLocaleString("pt-BR");
    }

    function formatDecimal(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercent(value) {
      return `${formatDecimal(value)}%`;
    }

    function safeText(value, fallback = "Não informado") {
      if (value === null || value === undefined || value === "") return fallback;
      return value;
    }

    function getField(object, ...keys) {
      for (const key of keys) {
        if (object && object[key] !== undefined && object[key] !== null && object[key] !== "") {
          return object[key];
        }
      }

      return "";
    }

    function getActionValue(actions) {
      if (!actions) return 0;
      if (!Array.isArray(actions)) return toNumber(actions);

      const targetActionTypes = [
        "onsite_conversion.messaging_conversation_started_7d",
        "onsite_conversion.messaging_conversation_started",
        "messaging_conversation_started_7d",
        "messaging_conversation_started"
      ];

      return actions.reduce((total, action) => {
        const type = String(action.action_type || action["Action Type"] || action.type || "").toLowerCase();
        if (!targetActionTypes.includes(type)) return total;
        return total + toNumber(action.value || action.Value || 0);
      }, 0);
    }

    function getMessages(row) {
      const actions = getField(row, "actions", "Actions");
      if (actions) return getActionValue(actions);

      const directMessages = getField(row, "messages", "Messages", "results", "Results");
      return toNumber(directMessages);
    }

    function getRowDate(row) {
      return getField(row, "date_start", "Date Start", "dateStart", "date", "Date");
    }

    function dateKey(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "";
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getDateKeyFromValue(value) {
      if (!value) return "";
      if (value instanceof Date) return dateKey(value);

      const text = String(value).trim();
      const isoMatch = text.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (isoMatch) return `${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}`;

      const brMatch = text.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
      if (brMatch) return `${brMatch[3]}-${brMatch[2]}-${brMatch[1]}`;

      const parsedDate = new Date(text);
      if (Number.isNaN(parsedDate.getTime())) return "";
      return dateKey(parsedDate);
    }

    function parseDate(value) {
      const key = getDateKeyFromValue(value);
      if (!key) return null;
      const [year, month, day] = key.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDateBR(value) {
      const key = getDateKeyFromValue(value);
      if (!key) return "Data não informada";
      const [year, month, day] = key.split("-");
      return `${day}/${month}/${year}`;
    }

    function normalizeRows(data) {
      const source = data.rows || data.campaigns || [];

      if (typeof source === "string") {
        try {
          return normalizeRows({ rows: JSON.parse(source) });
        } catch {
          return [];
        }
      }

      if (Array.isArray(source)) {
        return source.flatMap(item => Array.isArray(item) ? item : [item]).filter(Boolean);
      }

      return [];
    }

    function normalizeStatusRows(data, keys) {
      for (const key of keys) {
        const source = data[key];
        if (!source) continue;

        if (typeof source === "string") {
          try {
            return normalizeStatusRows({ [key]: JSON.parse(source) }, [key]);
          } catch {
            return [];
          }
        }

        if (Array.isArray(source)) {
          return source.flatMap(item => Array.isArray(item) ? item : [item]).filter(Boolean);
        }
      }

      return [];
    }

    function getStatusId(item, ...keys) {
      return String(getField(item, ...keys) || "").trim();
    }

    function buildStatusMap(items, ...idKeys) {
      const map = new Map();

      items.forEach(item => {
        const id = getStatusId(item, ...idKeys);
        if (!id) return;
        map.set(id, item);
      });

      return map;
    }

    function getStatusSources() {
      const data = dashboardData || {};

      return {
        campaignMap: buildStatusMap(
          normalizeStatusRows(data, ["campaign_statuses", "campaignStatuses"]),
          "id", "campaign_id", "Campaign ID"
        ),
        adsetMap: buildStatusMap(
          normalizeStatusRows(data, ["adset_statuses", "adsetStatuses"]),
          "id", "adset_id", "Adset ID", "Ad Set ID"
        ),
        adMap: buildStatusMap(
          normalizeStatusRows(data, ["ad_statuses", "adStatuses"]),
          "id", "ad_id", "Ad ID"
        )
      };
    }

    function getRawStatus(statusItem) {
      if (!statusItem) return "";
      return getField(statusItem, "effective_status", "Effective Status", "configured_status", "Configured Status", "status", "Status");
    }

    function normalizeMetaStatus(status) {
      return String(status || "").trim().toUpperCase();
    }

    function isActiveStatus(status) {
      const value = normalizeMetaStatus(status);
      return value === "ACTIVE" || value === "ENABLED";
    }

    function resolveStatusFromValues(statusValues) {
      const cleanStatuses = statusValues.map(normalizeMetaStatus).filter(Boolean);
      if (!cleanStatuses.length) return "NO_STATUS";
      if (cleanStatuses.some(isActiveStatus)) return "ACTIVE";
      return "INACTIVE";
    }

    function translateDisplayStatus(status) {
      const value = normalizeMetaStatus(status);
      if (value === "ACTIVE") return "Ativo";
      if (value === "INACTIVE") return "Inativo";
      return "Sem status";
    }

    function getDisplayStatusClass(status) {
      const value = normalizeMetaStatus(status);
      if (value === "ACTIVE") return "status-active";
      if (value === "INACTIVE") return "status-inactive";
      return "status-missing";
    }

    function buildStatusBadge(status) {
      const label = translateDisplayStatus(status);
      const className = getDisplayStatusClass(status);
      return `<span class="status-badge ${className}">${label}</span>`;
    }

    function getObjectStatusForRow(row, level, statusSources) {
      const campaignId = String(getField(row, "campaign_id", "Campaign ID") || "").trim();
      const adsetId = String(getField(row, "adset_id", "Adset ID", "Ad Set ID") || "").trim();
      const adId = String(getField(row, "ad_id", "Ad ID") || "").trim();

      if (level === "campaign" && campaignId) {
        const status = getRawStatus(statusSources.campaignMap.get(campaignId));
        if (status) return status;
      }

      if (level === "adset" && adsetId) {
        const status = getRawStatus(statusSources.adsetMap.get(adsetId));
        if (status) return status;
      }

      if (level === "ad" && adId) {
        const status = getRawStatus(statusSources.adMap.get(adId));
        if (status) return status;
      }

      if (adId) {
        const status = getRawStatus(statusSources.adMap.get(adId));
        if (status) return status;
      }

      return "";
    }

    function getAvailableDateRange(rows) {
      const keys = rows.map(row => getDateKeyFromValue(getRowDate(row))).filter(Boolean).sort();
      if (!keys.length) return { minDate: null, maxDate: null };
      return {
        minDate: parseDate(keys[0]),
        maxDate: parseDate(keys[keys.length - 1])
      };
    }

    function getPeriodRange(rows, period) {
      const { minDate, maxDate } = getAvailableDateRange(rows);
      if (!minDate || !maxDate) return { start: null, end: null };

      if (period === "all") return { start: minDate, end: maxDate };

      const days = Number(period.replace("last_", "").replace("d", ""));
      if (!days || Number.isNaN(days)) return { start: minDate, end: maxDate };

      const start = new Date(maxDate);
      start.setDate(start.getDate() - days + 1);
      return { start, end: maxDate };
    }

    function filterRowsByDate(rows, start, end) {
      if (!start || !end) return rows;
      const startKey = dateKey(start);
      const endKey = dateKey(end);

      return rows.filter(row => {
        const rowKey = getDateKeyFromValue(getRowDate(row));
        if (!rowKey) return false;
        return rowKey >= startKey && rowKey <= endKey;
      });
    }

    function calculateTotals(rows) {
      const totals = rows.reduce((acc, row) => {
        const spend = toNumber(getField(row, "spend", "Spend"));
        const messages = getMessages(row);
        const clicks = toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        const impressions = toNumber(getField(row, "impressions", "Impressions"));
        const reach = toNumber(getField(row, "reach", "Reach"));

        acc.spend += spend;
        acc.messages += messages;
        acc.clicks += clicks;
        acc.impressions += impressions;
        acc.reach += reach;

        return acc;
      }, {
        spend: 0,
        messages: 0,
        clicks: 0,
        impressions: 0,
        reach: 0
      });

      totals.cpl = totals.messages > 0 ? totals.spend / totals.messages : 0;
      totals.ctr = totals.impressions > 0 ? (totals.clicks / totals.impressions) * 100 : 0;
      totals.cpm = totals.impressions > 0 ? (totals.spend / totals.impressions) * 1000 : 0;
      totals.frequency = totals.reach > 0 ? totals.impressions / totals.reach : 0;

      return totals;
    }

    function getLevelConfig(level) {
      return LEVEL_CONFIG[level] || LEVEL_CONFIG.campaign;
    }

    function getEntityFromRow(row, level) {
      const config = getLevelConfig(level);
      return {
        id: String(getField(row, ...config.idKeys) || "").trim(),
        name: String(getField(row, ...config.nameKeys) || "").trim()
      };
    }

    function entityMatches(row, level, entity) {
      if (!entity) return true;
      const rowEntity = getEntityFromRow(row, level);

      if (entity.id && rowEntity.id) return rowEntity.id === String(entity.id);
      if (entity.name && rowEntity.name) return rowEntity.name === String(entity.name);
      return false;
    }

    function getScopedRows(periodRows) {
      let scopedRows = [...periodRows];

      if (selectedCampaign && (currentView === "adset" || currentView === "ad")) {
        scopedRows = scopedRows.filter(row => entityMatches(row, "campaign", selectedCampaign));
      }

      if (selectedAdset && currentView === "ad") {
        scopedRows = scopedRows.filter(row => entityMatches(row, "adset", selectedAdset));
      }

      return scopedRows;
    }

    function groupRowsByLevel(rows, level) {
      const config = getLevelConfig(level);
      const groups = new Map();
      const statusSources = getStatusSources();

      rows.forEach(row => {
        const entity = getEntityFromRow(row, level);
        const key = entity.id || entity.name || "sem-identificacao";

        if (!groups.has(key)) {
          groups.set(key, {
            name: entity.name,
            id: entity.id,
            spend: 0,
            messages: 0,
            clicks: 0,
            impressions: 0,
            reach: 0,
            days: new Set(),
            statuses: []
          });
        }

        const item = groups.get(key);
        item.spend += toNumber(getField(row, "spend", "Spend"));
        item.messages += getMessages(row);
        item.clicks += toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        item.impressions += toNumber(getField(row, "impressions", "Impressions"));
        item.reach += toNumber(getField(row, "reach", "Reach"));

        const rowKey = getDateKeyFromValue(getRowDate(row));
        if (rowKey) item.days.add(rowKey);

        const rowStatus = getObjectStatusForRow(row, level, statusSources);
        if (rowStatus) item.statuses.push(rowStatus);
      });

      return Array.from(groups.values()).map(item => {
        const status = resolveStatusFromValues(item.statuses);
        return {
          ...item,
          status,
          statusLabel: translateDisplayStatus(status),
          cpl: item.messages > 0 ? item.spend / item.messages : 0,
          ctr: item.impressions > 0 ? (item.clicks / item.impressions) * 100 : 0,
          cpm: item.impressions > 0 ? (item.spend / item.impressions) * 1000 : 0,
          frequency: item.reach > 0 ? item.impressions / item.reach : 0,
          daysCount: item.days.size,
          level
        };
      });
    }

    function sortDimensionRows(rows) {
      const { key, direction } = sortState;

      return [...rows].sort((a, b) => {
        let valueA = a[key];
        let valueB = b[key];

        if (key === "name" || key === "statusLabel") {
          valueA = String(valueA || "").toLowerCase();
          valueB = String(valueB || "").toLowerCase();
          if (valueA < valueB) return direction === "asc" ? -1 : 1;
          if (valueA > valueB) return direction === "asc" ? 1 : -1;
          return 0;
        }

        valueA = toNumber(valueA);
        valueB = toNumber(valueB);
        return direction === "asc" ? valueA - valueB : valueB - valueA;
      });
    }

    function changeSort(key) {
      if (sortState.key === key) {
        sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
      } else {
        sortState.key = key;
        sortState.direction = key === "name" || key === "statusLabel" ? "asc" : "desc";
      }

      renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
    }

    function sortIndicator(key) {
      if (sortState.key !== key) return "";
      return sortState.direction === "asc" ? "↑" : "↓";
    }

    function buildSortableHeader(label, key) {
      return `
        <button class="sort-button" onclick="changeSort('${key}')">
          ${label}
          <span class="sort-indicator">${sortIndicator(key)}</span>
        </button>
      `;
    }

    function resetSort() {
      sortState = {
        key: "spend",
        direction: "desc"
      };
    }

    function goToLevel(level) {
      if (level === "campaign") {
        selectedCampaign = null;
        selectedAdset = null;
      }

      if (level === "adset") {
        selectedAdset = null;
      }

      currentView = level;
      resetSort();
      renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
    }

    function resetNavigation() {
      goToLevel("campaign");
    }

    function drillIntoVisible(index) {
      const item = currentVisibleItems[index];
      if (!item) return;

      if (currentView === "campaign") {
        selectedCampaign = { id: item.id, name: item.name };
        selectedAdset = null;
        currentView = "adset";
        resetSort();
        renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
        return;
      }

      if (currentView === "adset") {
        selectedAdset = { id: item.id, name: item.name };
        currentView = "ad";
        resetSort();
        renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
      }
    }

    function buildTabs() {
      return `
        <div class="manager-tabs">
          <button class="tab-button ${currentView === "campaign" ? "active" : ""}" onclick="goToLevel('campaign')">
            Campanhas
          </button>
          <button class="tab-button ${currentView === "adset" ? "active" : ""}" onclick="goToLevel('adset')">
            Conjuntos de anúncios
          </button>
          <button class="tab-button ${currentView === "ad" ? "active" : ""}" onclick="goToLevel('ad')">
            Anúncios
          </button>
        </div>
      `;
    }

    function buildBreadcrumb() {
      const campaignLabel = selectedCampaign ? safeText(selectedCampaign.name || selectedCampaign.id, "Campanha selecionada") : "Todas as campanhas";
      const adsetLabel = selectedAdset ? safeText(selectedAdset.name || selectedAdset.id, "Conjunto selecionado") : "Todos os conjuntos";

      if (currentView === "campaign") {
        return `
          <div class="breadcrumb">
            <button class="crumb current">Campanhas</button>
          </div>
        `;
      }

      if (currentView === "adset") {
        return `
          <div class="breadcrumb">
            <button class="crumb" onclick="goToLevel('campaign')">Campanhas</button>
            <span>›</span>
            <button class="crumb current">${escapeHTML(campaignLabel)}</button>
          </div>
        `;
      }

      return `
        <div class="breadcrumb">
          <button class="crumb" onclick="goToLevel('campaign')">Campanhas</button>
          <span>›</span>
          <button class="crumb" onclick="goToLevel('adset')">${escapeHTML(campaignLabel)}</button>
          <span>›</span>
          <button class="crumb current">${escapeHTML(adsetLabel)}</button>
        </div>
      `;
    }

    function buildToolbar(period, customStart, customEnd) {
      return `
        <div class="toolbar">
          <div class="field">
            <label>Período</label>
            <select id="periodSelect" onchange="handlePeriodChange()">
              <option value="all" ${period === "all" ? "selected" : ""}>Todo o período disponível</option>
              <option value="last_1d" ${period === "last_1d" ? "selected" : ""}>Último dia com dados</option>
              <option value="last_3d" ${period === "last_3d" ? "selected" : ""}>Últimos 3 dias</option>
              <option value="last_7d" ${period === "last_7d" ? "selected" : ""}>Últimos 7 dias</option>
              <option value="last_14d" ${period === "last_14d" ? "selected" : ""}>Últimos 14 dias</option>
              <option value="last_30d" ${period === "last_30d" ? "selected" : ""}>Últimos 30 dias</option>
              <option value="last_90d" ${period === "last_90d" ? "selected" : ""}>Últimos 90 dias</option>
              <option value="custom" ${period === "custom" ? "selected" : ""}>Personalizado</option>
            </select>
          </div>

          <div class="field">
            <label>Data inicial</label>
            <input id="customStart" type="date" value="${customStart}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <div class="field">
            <label>Data final</label>
            <input id="customEnd" type="date" value="${customEnd}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <button class="btn btn-primary" onclick="applyFilters()">Aplicar</button>
        </div>
      `;
    }

    function buildCards(totals) {
      return `
        <section class="cards">
          <div class="metric-card">
            <div class="metric-label">Investimento</div>
            <div class="metric-value">${formatMoney(totals.spend)}</div>
            <div class="metric-helper">Soma do escopo atual</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Mensagens</div>
            <div class="metric-value">${formatNumber(totals.messages)}</div>
            <div class="metric-helper">Resultado principal</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Custo por mensagem</div>
            <div class="metric-value">${formatMoney(totals.cpl)}</div>
            <div class="metric-helper">Investimento / mensagens</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">CTR</div>
            <div class="metric-value">${formatPercent(totals.ctr)}</div>
            <div class="metric-helper">Cliques / impressões</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Cliques</div>
            <div class="metric-value">${formatNumber(totals.clicks)}</div>
            <div class="metric-helper">Cliques no link</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Impressões</div>
            <div class="metric-value">${formatNumber(totals.impressions)}</div>
            <div class="metric-helper">Exibições totais</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">CPM</div>
            <div class="metric-value">${formatMoney(totals.cpm)}</div>
            <div class="metric-helper">Custo por mil impressões</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Frequência</div>
            <div class="metric-value">${formatDecimal(totals.frequency)}</div>
            <div class="metric-helper">Impressões / alcance</div>
          </div>
        </section>
      `;
    }

    function buildTableRows(items) {
      const config = getLevelConfig(currentView);

      if (!items.length) {
        return `
          <tr>
            <td colspan="13">
              <div class="empty-state">Nenhum dado encontrado para o período ou escopo selecionado.</div>
            </td>
          </tr>
        `;
      }

      return items.map((item, index) => {
        const isClickable = currentView !== "ad";
        const deliveryLabel = normalizeMetaStatus(item.status) === "ACTIVE" ? "Ativo" : "Inativo";
        const deliveryClass = normalizeMetaStatus(item.status) === "ACTIVE" ? "" : "off";
        const nextIcon = isClickable ? `<span class="drill-icon" title="${config.nextLabel}">›</span>` : "";

        return `
          <tr class="${isClickable ? "clickable-row" : ""}" ${isClickable ? `onclick="drillIntoVisible(${index})"` : ""}>
            <td>
              <div class="entity-cell">
                <span class="check-square"></span>
                <div>
                  <div class="entity-name-row">
                    <span class="entity-name" title="${escapeHTML(safeText(item.name, `${config.singular} sem nome`))}">${escapeHTML(safeText(item.name, `${config.singular} sem nome`))}</span>
                    ${nextIcon}
                  </div>
                  <div class="entity-id">ID: ${escapeHTML(safeText(item.id, "não informado"))}</div>
                </div>
              </div>
            </td>
            <td>${buildStatusBadge(item.status)}</td>
            <td><span class="delivery"><span class="delivery-dot ${deliveryClass}"></span>${deliveryLabel}</span></td>
            <td class="numeric">${formatNumber(item.messages)}</td>
            <td class="numeric">${formatMoney(item.cpl)}</td>
            <td class="numeric">${formatNumber(item.clicks)}</td>
            <td class="numeric">${formatPercent(item.ctr)}</td>
            <td class="numeric">${formatMoney(item.spend)}</td>
            <td class="numeric">${formatNumber(item.impressions)}</td>
            <td class="numeric">${formatNumber(item.reach)}</td>
            <td class="numeric">${formatMoney(item.cpm)}</td>
            <td class="numeric">${formatDecimal(item.frequency)}</td>
            <td class="numeric">${item.daysCount}</td>
          </tr>
        `;
      }).join("");
    }

    function buildTable(visibleItems, totalItems) {
      const config = getLevelConfig(currentView);
      const limitInfo = `Exibindo ${visibleItems.length} de ${totalItems} ${config.label.toLowerCase()}.`;

      return `
        <section class="table-card">
          <div class="table-header">
            <div>
              <h3 class="table-title">${config.title}</h3>
              <p class="table-subtitle">${config.subtitle}</p>
            </div>
            <p class="table-subtitle">${limitInfo}</p>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>${buildSortableHeader(config.singular, "name")}</th>
                  <th>${buildSortableHeader("Status", "statusLabel")}</th>
                  <th>Veiculação</th>
                  <th>${buildSortableHeader("Mensagens", "messages")}</th>
                  <th>${buildSortableHeader("Custo/mensagem", "cpl")}</th>
                  <th>${buildSortableHeader("Cliques", "clicks")}</th>
                  <th>${buildSortableHeader("CTR", "ctr")}</th>
                  <th>${buildSortableHeader("Investimento", "spend")}</th>
                  <th>${buildSortableHeader("Impressões", "impressions")}</th>
                  <th>${buildSortableHeader("Alcance", "reach")}</th>
                  <th>${buildSortableHeader("CPM", "cpm")}</th>
                  <th>${buildSortableHeader("Frequência", "frequency")}</th>
                  <th>${buildSortableHeader("Dias", "daysCount")}</th>
                </tr>
              </thead>
              <tbody>
                ${buildTableRows(visibleItems)}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function buildAIAnalysisCard() {
      return `
        <section class="ai-analysis-card">
          <div class="ai-analysis-header">
            <div>
              <h3 class="ai-analysis-title">Análise das métricas com IA</h3>
              <p class="ai-analysis-subtitle">A análise usa o período, o escopo atual e no máximo 5 linhas da tabela.</p>
            </div>
            <button id="aiAnalysisButton" class="btn btn-primary" onclick="generateAIAnalysis()">Gerar análise com IA</button>
          </div>
          <div id="aiAnalysisOutput" class="ai-analysis-output">Clique no botão para gerar uma leitura executiva das métricas exibidas.</div>
        </section>
      `;
    }

    function buildAIContext(periodLabel, scopedTotals, visibleItems) {
      const config = getLevelConfig(currentView);
      const campaignLabel = selectedCampaign ? safeText(selectedCampaign.name || selectedCampaign.id, "Campanha selecionada") : "Todas as campanhas";
      const adsetLabel = selectedAdset ? safeText(selectedAdset.name || selectedAdset.id, "Conjunto selecionado") : "Todos os conjuntos";

      return {
        periodo: periodLabel,
        nivel_visualizado: config.label,
        campanha_selecionada: campaignLabel,
        conjunto_selecionado: adsetLabel,
        objetivo: "geracao_de_mensagens_ou_leads",
        resumo: {
          investimento_total: scopedTotals.spend,
          mensagens: scopedTotals.messages,
          custo_por_mensagem: scopedTotals.cpl,
          cliques: scopedTotals.clicks,
          ctr: scopedTotals.ctr,
          impressoes: scopedTotals.impressions,
          alcance: scopedTotals.reach,
          cpm: scopedTotals.cpm,
          frequencia: scopedTotals.frequency
        },
        linhas_analisadas: visibleItems.map(item => ({
          nome: item.name,
          id: item.id,
          status: item.statusLabel,
          mensagens: item.messages,
          custo_por_mensagem: item.cpl,
          cliques: item.clicks,
          ctr: item.ctr,
          investimento: item.spend,
          impressoes: item.impressions,
          alcance: item.reach,
          cpm: item.cpm,
          frequencia: item.frequency,
          dias: item.daysCount
        }))
      };
    }

    async function generateAIAnalysis() {
      const button = document.getElementById("aiAnalysisButton");
      const output = document.getElementById("aiAnalysisOutput");

      if (!button || !output) return;

      if (!currentAIContext || !currentAIContext.linhas_analisadas.length) {
        output.textContent = "Não há dados suficientes para gerar a análise.";
        return;
      }

      button.disabled = true;
      button.textContent = "Gerando análise...";
      output.textContent = "Analisando métricas, aguarde...";

      try {
        const response = await fetch("/api/ai-analysis", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(currentAIContext)
        });

        if (!response.ok) {
          throw new Error("Não foi possível gerar a análise com IA. Verifique a rota /api/ai-analysis ou o cenário do Make.");
        }

        const data = await response.json();
        const analysis = data.analysis || data.ai_analysis || "";
        output.textContent = analysis || "A IA não retornou uma análise para esses dados.";
      } catch (error) {
        output.textContent = error.message;
      } finally {
        button.disabled = false;
        button.textContent = "Gerar análise com IA";
      }
    }

    function getDefaultCustomRange() {
      const allRows = normalizeRows(dashboardData || {});
      const range = getPeriodRange(allRows, "last_7d");

      return {
        start: range.start ? dateKey(range.start) : "",
        end: range.end ? dateKey(range.end) : ""
      };
    }

    function handlePeriodChange() {
      const period = document.getElementById("periodSelect").value;

      if (period !== "custom") {
        renderDashboard(period, "", "");
        return;
      }

      const customStartInput = document.getElementById("customStart");
      const customEndInput = document.getElementById("customEnd");
      const defaultRange = getDefaultCustomRange();

      const start = customStartInput.value || currentCustomStart || defaultRange.start;
      const end = customEndInput.value || currentCustomEnd || defaultRange.end;

      renderDashboard("custom", start, end);
    }

    function applyFilters() {
      const period = document.getElementById("periodSelect").value;
      const customStart = document.getElementById("customStart").value;
      const customEnd = document.getElementById("customEnd").value;
      renderDashboard(period, customStart, customEnd);
    }

    function renderDashboard(period = currentPeriod, customStart = currentCustomStart, customEnd = currentCustomEnd) {
      const dashboard = document.getElementById("dashboard");

      currentPeriod = period;
      currentCustomStart = customStart;
      currentCustomEnd = customEnd;

      if (!dashboardData) {
        dashboard.innerHTML = `<div class="loading">Carregando dados...</div>`;
        return;
      }

      const allRows = normalizeRows(dashboardData);
      let start = null;
      let end = null;

      if (period === "custom" && customStart && customEnd) {
        start = parseDate(customStart);
        end = parseDate(customEnd);
      } else {
        const range = getPeriodRange(allRows, period);
        start = range.start;
        end = range.end;
      }

      const periodRows = filterRowsByDate(allRows, start, end);
      const scopedRows = getScopedRows(periodRows);
      const scopedTotals = calculateTotals(scopedRows);
      const groupedRows = groupRowsByLevel(scopedRows, currentView);
      const sortedRows = sortDimensionRows(groupedRows);
      const visibleItems = sortedRows;
      const periodLabel = start && end ? `${formatDateBR(start)} até ${formatDateBR(end)}` : "Período não identificado";

      currentVisibleItems = visibleItems;
      currentAIContext = buildAIContext(periodLabel, scopedTotals, visibleItems);

      dashboard.innerHTML = `
        <section class="manager-panel">
          ${buildTabs()}
          ${buildToolbar(period, customStart, customEnd)}
          <div class="context-row">
            ${buildBreadcrumb()}
            <div class="context-meta">
              <span><strong>Período:</strong> ${escapeHTML(periodLabel)}</span>
              <span><strong>Última atualização:</strong> ${escapeHTML(safeText(dashboardData.updated_at || dashboardData.received_at, "Ainda não informado"))}</span>
              <span><strong>Linhas base:</strong> ${scopedRows.length} de ${periodRows.length}</span>
            </div>
          </div>
        </section>

        ${buildCards(scopedTotals)}
        ${buildTable(visibleItems, sortedRows.length)}
        ${buildAIAnalysisCard()}
      `;
    }

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");
      dashboard.innerHTML = `<div class="loading">Carregando dados...</div>`;

      try {
        const response = await fetch("/api/webhook", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Não foi possível carregar os dados do webhook.");
        }

        dashboardData = await response.json();
        resetSort();
        renderDashboard("last_7d", "", "");
      } catch (error) {
        dashboard.innerHTML = `
          <div class="error">
            <strong>Erro ao carregar o dashboard.</strong>
            <br><br>
            ${escapeHTML(error.message)}
          </div>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
