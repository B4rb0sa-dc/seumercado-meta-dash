<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title-area h1 {
      margin: 0 0 8px;
      font-size: 34px;
      color: #1877f2;
    }

    .title-area p {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
    }

    .refresh-button {
      border: none;
      background: #1877f2;
      color: #ffffff;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 6px 18px rgba(24, 119, 242, 0.25);
    }

    .filters {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr auto;
      gap: 14px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
      color: #4b5563;
    }

    select,
    input[type="date"] {
      height: 42px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      color: #111827;
      background: #ffffff;
    }

    .apply-button {
      height: 42px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      padding: 0 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .status-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      color: #4b5563;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .card .label {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 28px;
      font-weight: bold;
      color: #020617;
    }

    .card .small {
      margin-top: 8px;
      font-size: 13px;
      color: #9ca3af;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-bottom: 30px;
    }

    .chart-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      min-height: 360px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chart-title {
      font-size: 18px;
      font-weight: bold;
      color: #111827;
      margin: 0 0 4px;
    }

    .chart-subtitle {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
      font-size: 13px;
      color: #4b5563;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .chart-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .donut-layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 20px;
      align-items: center;
      margin-top: 10px;
    }

    .donut-legend {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 13px;
    }

    .donut-legend-row {
      display: grid;
      grid-template-columns: 12px 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .donut-name {
      color: #374151;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .donut-value {
      color: #111827;
      font-weight: bold;
    }

    .empty-chart {
      padding: 40px 10px;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 32px 0 16px;
    }

    .section-title {
      margin: 0;
      font-size: 24px;
      color: #111827;
    }

    .dimension-buttons {
      display: flex;
      gap: 8px;
      background: #ffffff;
      padding: 6px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .dimension-button {
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #374151;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .dimension-button.active {
      background: #1877f2;
      color: #ffffff;
      border-color: #1877f2;
    }

    .table-wrapper {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #eef0f4;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #4b5563;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      color: #111827;
    }

    .sort-button {
      width: 100%;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: bold;
      text-align: left;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-indicator {
      color: #1877f2;
      font-size: 12px;
    }

    .dimension-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .dimension-id {
      font-size: 12px;
      color: #6b7280;
      word-break: break-all;
    }

    .loading,
    .error {
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .error {
      color: #b91c1c;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 1000px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .donut-layout {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .donut-legend {
        width: 100%;
      }
    }

    @media (max-width: 700px) {
      .container {
        padding: 20px 12px 40px;
      }

      .header,
      .section-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .refresh-button {
        width: 100%;
      }

      .filters {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .status-card {
        display: block;
      }

      .status-card > div {
        margin-bottom: 8px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .card {
        padding: 18px;
      }

      .card .value {
        font-size: 24px;
      }

      .chart-card {
        padding: 16px;
        min-height: auto;
      }

      .chart-header {
        flex-direction: column;
      }

      .dimension-buttons {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
      }

      .dimension-button {
        width: 100%;
      }

      .table-wrapper {
        background: transparent;
        box-shadow: none;
        border-radius: 0;
        overflow-x: visible;
      }

      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }

      table {
        min-width: 0;
      }

      thead {
        display: none;
      }

      tbody {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      tr {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        padding: 12px;
      }

      td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        border-bottom: 1px solid #eef0f4;
        padding: 12px 4px;
        font-size: 13px;
        text-align: right;
      }

      td:last-child {
        border-bottom: none;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #4b5563;
        text-align: left;
        min-width: 110px;
      }

      td:first-child {
        display: block;
        text-align: left;
      }

      td:first-child::before {
        display: block;
        margin-bottom: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="title-area">
        <h1>Meta Ads Dashboard</h1>
        <p>Acompanhamento dos principais indicadores por período.</p>
      </div>

      <button class="refresh-button" onclick="loadDashboard()">
        Atualizar dados
      </button>
    </div>

    <div id="dashboard">
      <div class="loading">Carregando dados...</div>
    </div>
  </div>

  <script>
    let dashboardData = null;
    let currentPeriod = "last_7d";
    let currentCustomStart = "";
    let currentCustomEnd = "";
    let currentDimension = "campaign";

    let sortState = {
      key: "spend",
      direction: "desc"
    };

    const CHART_COLORS = [
      "#1877f2",
      "#10b981",
      "#f97316",
      "#f59e0b",
      "#8b5cf6",
      "#ef4444"
    ];

    function toNumber(value) {
      if (value === null || value === undefined || value === "") return 0;

      if (typeof value === "object" && value.value !== undefined) {
        return toNumber(value.value);
      }

      if (typeof value === "object" && value.Value !== undefined) {
        return toNumber(value.Value);
      }

      if (typeof value === "number") return value;

      let text = String(value)
        .replace("R$", "")
        .replace("%", "")
        .replace(/\s/g, "")
        .trim();

      if (!text) return 0;

      const hasComma = text.includes(",");
      const hasDot = text.includes(".");

      if (hasComma && hasDot) {
        const lastComma = text.lastIndexOf(",");
        const lastDot = text.lastIndexOf(".");

        if (lastComma > lastDot) {
          text = text.replace(/\./g, "").replace(",", ".");
        } else {
          text = text.replace(/,/g, "");
        }
      } else if (hasComma) {
        text = text.replace(",", ".");
      }

      return Number(text) || 0;
    }

    function formatMoney(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatShortMoney(value) {
      return `R$${Math.round(toNumber(value)).toLocaleString("pt-BR")}`;
    }

    function formatNumber(value) {
      return Math.round(toNumber(value)).toLocaleString("pt-BR");
    }

    function formatDecimal(value) {
      return toNumber(value).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercent(value) {
      return `${formatDecimal(value)}%`;
    }

    function safeText(value, fallback = "Não informado") {
      if (value === null || value === undefined || value === "") {
        return fallback;
      }

      return value;
    }

    function getField(object, ...keys) {
      for (const key of keys) {
        if (
          object &&
          object[key] !== undefined &&
          object[key] !== null &&
          object[key] !== ""
        ) {
          return object[key];
        }
      }

      return "";
    }

    function getActionValue(actions) {
      if (!actions) return 0;

      if (!Array.isArray(actions)) {
        return toNumber(actions);
      }

      const preferredAction = actions.find(action => {
        const type = String(
          action.action_type ||
          action["Action Type"] ||
          action.type ||
          ""
        ).toLowerCase();

        return (
          type.includes("messaging") ||
          type.includes("message") ||
          type.includes("whatsapp") ||
          type.includes("lead")
        );
      });

      const fallbackAction = actions.find(action =>
        action.value !== undefined ||
        action.Value !== undefined
      );

      const action = preferredAction || fallbackAction;

      if (!action) return 0;

      return toNumber(action.value || action.Value || 0);
    }

    function getMessages(row) {
      const directMessages = getField(
        row,
        "messages",
        "Messages",
        "results",
        "Results"
      );

      const directValue = toNumber(directMessages);

      if (directValue > 0) {
        return directValue;
      }

      const actions = getField(row, "actions", "Actions");

      return getActionValue(actions);
    }

    function getRowDate(row) {
      return getField(
        row,
        "date_start",
        "Date Start",
        "dateStart",
        "date",
        "Date"
      );
    }

    function dateKey(date) {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
        return "";
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function getDateKeyFromValue(value) {
      if (!value) return "";

      if (value instanceof Date) {
        return dateKey(value);
      }

      const text = String(value).trim();

      const isoMatch = text.match(/(\d{4})-(\d{2})-(\d{2})/);

      if (isoMatch) {
        return `${isoMatch[1]}-${isoMatch[2]}-${isoMatch[3]}`;
      }

      const brMatch = text.match(/^(\d{2})\/(\d{2})\/(\d{4})/);

      if (brMatch) {
        return `${brMatch[3]}-${brMatch[2]}-${brMatch[1]}`;
      }

      const parsedDate = new Date(text);

      if (Number.isNaN(parsedDate.getTime())) {
        return "";
      }

      return dateKey(parsedDate);
    }

    function parseDate(value) {
      const key = getDateKeyFromValue(value);

      if (!key) return null;

      const [year, month, day] = key.split("-").map(Number);

      return new Date(year, month - 1, day);
    }

    function formatDateBR(value) {
      const key = getDateKeyFromValue(value);

      if (!key) return "Data não informada";

      const [year, month, day] = key.split("-");

      return `${day}/${month}/${year}`;
    }

    function formatDateShort(value) {
      const key = getDateKeyFromValue(value);

      if (!key) return "";

      const [, month, day] = key.split("-");

      return `${day}/${month}`;
    }

    function normalizeRows(data) {
      const source = data.rows || data.campaigns || [];

      if (typeof source === "string") {
        try {
          return normalizeRows({ rows: JSON.parse(source) });
        } catch {
          return [];
        }
      }

      if (Array.isArray(source)) {
        return source
          .flatMap(item => Array.isArray(item) ? item : [item])
          .filter(Boolean);
      }

      return [];
    }

    function getAvailableDateRange(rows) {
      const keys = rows
        .map(row => getDateKeyFromValue(getRowDate(row)))
        .filter(Boolean)
        .sort();

      if (!keys.length) {
        return {
          minDate: null,
          maxDate: null
        };
      }

      return {
        minDate: parseDate(keys[0]),
        maxDate: parseDate(keys[keys.length - 1])
      };
    }

    function getPeriodRange(rows, period) {
      const { minDate, maxDate } = getAvailableDateRange(rows);

      if (!minDate || !maxDate) {
        return {
          start: null,
          end: null
        };
      }

      if (period === "all") {
        return {
          start: minDate,
          end: maxDate
        };
      }

      const days = Number(period.replace("last_", "").replace("d", ""));

      if (!days || Number.isNaN(days)) {
        return {
          start: minDate,
          end: maxDate
        };
      }

      const start = new Date(maxDate);
      start.setDate(start.getDate() - days + 1);

      return {
        start,
        end: maxDate
      };
    }

    function filterRowsByDate(rows, start, end) {
      if (!start || !end) return rows;

      const startKey = dateKey(start);
      const endKey = dateKey(end);

      return rows.filter(row => {
        const rowKey = getDateKeyFromValue(getRowDate(row));

        if (!rowKey) return false;

        return rowKey >= startKey && rowKey <= endKey;
      });
    }

    function calculateTotals(rows) {
      const totals = rows.reduce((acc, row) => {
        const spend = toNumber(getField(row, "spend", "Spend"));
        const messages = getMessages(row);
        const clicks = toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        const impressions = toNumber(getField(row, "impressions", "Impressions"));
        const reach = toNumber(getField(row, "reach", "Reach"));

        acc.spend += spend;
        acc.messages += messages;
        acc.clicks += clicks;
        acc.impressions += impressions;
        acc.reach += reach;

        return acc;
      }, {
        spend: 0,
        messages: 0,
        clicks: 0,
        impressions: 0,
        reach: 0
      });

      totals.cpl = totals.messages > 0 ? totals.spend / totals.messages : 0;
      totals.ctr = totals.impressions > 0 ? (totals.clicks / totals.impressions) * 100 : 0;
      totals.cpm = totals.impressions > 0 ? (totals.spend / totals.impressions) * 1000 : 0;
      totals.frequency = totals.reach > 0 ? totals.impressions / totals.reach : 0;

      return totals;
    }

    function getDimensionConfig(dimension) {
      const configs = {
        campaign: {
          label: "Campanhas",
          title: "Campanhas por período",
          nameKeys: ["campaign_name", "Campaign Name", "Campaign"],
          idKeys: ["campaign_id", "Campaign ID"]
        },
        adset: {
          label: "Conjuntos",
          title: "Conjuntos por período",
          nameKeys: ["adset_name", "Adset Name", "Ad Set Name", "Adset"],
          idKeys: ["adset_id", "Adset ID", "Ad Set ID"]
        },
        ad: {
          label: "Anúncios",
          title: "Anúncios por período",
          nameKeys: ["ad_name", "Ad Name", "Ad"],
          idKeys: ["ad_id", "Ad ID"]
        }
      };

      return configs[dimension] || configs.campaign;
    }

    function groupRowsByDimension(rows, dimension) {
      const config = getDimensionConfig(dimension);
      const groups = new Map();

      rows.forEach(row => {
        const dimensionName = getField(row, ...config.nameKeys);
        const dimensionId = getField(row, ...config.idKeys);
        const key = dimensionId || dimensionName || "sem-identificacao";

        if (!groups.has(key)) {
          groups.set(key, {
            name: dimensionName,
            id: dimensionId,
            spend: 0,
            messages: 0,
            clicks: 0,
            impressions: 0,
            reach: 0,
            days: new Set()
          });
        }

        const item = groups.get(key);

        item.spend += toNumber(getField(row, "spend", "Spend"));
        item.messages += getMessages(row);
        item.clicks += toNumber(getField(row, "inline_link_clicks", "Inline Link Clicks", "link_clicks"));
        item.impressions += toNumber(getField(row, "impressions", "Impressions"));
        item.reach += toNumber(getField(row, "reach", "Reach"));

        const rowKey = getDateKeyFromValue(getRowDate(row));

        if (rowKey) {
          item.days.add(rowKey);
        }
      });

      return Array.from(groups.values()).map(item => ({
        ...item,
        cpl: item.messages > 0 ? item.spend / item.messages : 0,
        ctr: item.impressions > 0 ? (item.clicks / item.impressions) * 100 : 0,
        cpm: item.impressions > 0 ? (item.spend / item.impressions) * 1000 : 0,
        frequency: item.reach > 0 ? item.impressions / item.reach : 0,
        daysCount: item.days.size
      }));
    }

    function sortDimensionRows(rows) {
      const { key, direction } = sortState;

      return [...rows].sort((a, b) => {
        let valueA = a[key];
        let valueB = b[key];

        if (key === "name") {
          valueA = String(valueA || "").toLowerCase();
          valueB = String(valueB || "").toLowerCase();

          if (valueA < valueB) return direction === "asc" ? -1 : 1;
          if (valueA > valueB) return direction === "asc" ? 1 : -1;
          return 0;
        }

        valueA = toNumber(valueA);
        valueB = toNumber(valueB);

        return direction === "asc" ? valueA - valueB : valueB - valueA;
      });
    }

    function changeSort(key) {
      if (sortState.key === key) {
        sortState.direction = sortState.direction === "asc" ? "desc" : "asc";
      } else {
        sortState.key = key;
        sortState.direction = key === "name" ? "asc" : "desc";
      }

      renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
    }

    function sortIndicator(key) {
      if (sortState.key !== key) return "";

      return sortState.direction === "asc" ? "↑" : "↓";
    }

    function buildSortableHeader(label, key) {
      return `
        <button class="sort-button" onclick="changeSort('${key}')">
          ${label}
          <span class="sort-indicator">${sortIndicator(key)}</span>
        </button>
      `;
    }

    function buildDimensionTable(rows, dimension) {
      const groupedRows = sortDimensionRows(groupRowsByDimension(rows, dimension));
      const config = getDimensionConfig(dimension);

      if (!groupedRows.length) {
        return `
          <tr>
            <td colspan="10">Nenhum dado encontrado para o período selecionado.</td>
          </tr>
        `;
      }

      return groupedRows.map(item => `
        <tr>
          <td data-label="Dimensão">
            <div class="dimension-name">${safeText(item.name, `${config.label} sem nome`)}</div>
            <div class="dimension-id">ID: ${safeText(item.id, "não informado")}</div>
          </td>
          <td data-label="Mensagens">${formatNumber(item.messages)}</td>
          <td data-label="Custo/mensagem">${formatMoney(item.cpl)}</td>
          <td data-label="Cliques">${formatNumber(item.clicks)}</td>
          <td data-label="CTR">${formatPercent(item.ctr)}</td>
          <td data-label="Investimento">${formatMoney(item.spend)}</td>
          <td data-label="Impressões">${formatNumber(item.impressions)}</td>
          <td data-label="Alcance">${formatNumber(item.reach)}</td>
          <td data-label="CPM">${formatMoney(item.cpm)}</td>
          <td data-label="Dias">${item.daysCount}</td>
        </tr>
      `).join("");
    }

    function getDateKeysBetween(start, end) {
      if (!start || !end) return [];

      const keys = [];
      const cursor = new Date(start);

      while (cursor <= end) {
        keys.push(dateKey(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }

      return keys;
    }

    function getChartRange(start, end) {
      if (!start || !end) {
        return {
          chartStart: null,
          chartEnd: null
        };
      }

      const chartEnd = new Date(end);
      const chartStart = new Date(end);
      chartStart.setDate(chartStart.getDate() - 13);

      if (start > chartStart) {
        return {
          chartStart: start,
          chartEnd
        };
      }

      return {
        chartStart,
        chartEnd
      };
    }

    function aggregateDailyRows(rows, start, end) {
      const keys = getDateKeysBetween(start, end);
      const map = new Map();

      keys.forEach(key => {
        map.set(key, {
          date: key,
          spend: 0,
          messages: 0
        });
      });

      rows.forEach(row => {
        const key = getDateKeyFromValue(getRowDate(row));

        if (!map.has(key)) return;

        const item = map.get(key);

        item.spend += toNumber(getField(row, "spend", "Spend"));
        item.messages += getMessages(row);
      });

      return Array.from(map.values());
    }

    function buildLineChart(rows, start, end) {
      const { chartStart, chartEnd } = getChartRange(start, end);

      if (!chartStart || !chartEnd) {
        return `<div class="empty-chart">Não há dados suficientes para o gráfico.</div>`;
      }

      const dailyData = aggregateDailyRows(rows, chartStart, chartEnd);

      if (!dailyData.length) {
        return `<div class="empty-chart">Não há dados suficientes para o gráfico.</div>`;
      }

      const width = 720;
      const height = 320;
      const padding = {
        top: 24,
        right: 70,
        bottom: 48,
        left: 70
      };

      const innerWidth = width - padding.left - padding.right;
      const innerHeight = height - padding.top - padding.bottom;

      const maxSpend = Math.max(...dailyData.map(item => item.spend), 1);
      const maxMessages = Math.max(...dailyData.map(item => item.messages), 1);

      const x = index => {
        if (dailyData.length === 1) return padding.left + innerWidth / 2;

        return padding.left + (index / (dailyData.length - 1)) * innerWidth;
      };

      const ySpend = value => {
        return padding.top + innerHeight - (value / maxSpend) * innerHeight;
      };

      const yMessages = value => {
        return padding.top + innerHeight - (value / maxMessages) * innerHeight;
      };

      const spendPoints = dailyData
        .map((item, index) => `${x(index)},${ySpend(item.spend)}`)
        .join(" ");

      const messagesPoints = dailyData
        .map((item, index) => `${x(index)},${yMessages(item.messages)}`)
        .join(" ");

      const horizontalLines = [0, 0.25, 0.5, 0.75, 1].map(ratio => {
        const y = padding.top + innerHeight - ratio * innerHeight;
        const spendLabel = formatShortMoney(maxSpend * ratio);
        const messagesLabel = Math.round(maxMessages * ratio);

        return `
          <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" stroke="#eef0f4" />
          <text x="${padding.left - 10}" y="${y + 4}" text-anchor="end" font-size="11" fill="#1877f2">${spendLabel}</text>
          <text x="${width - padding.right + 10}" y="${y + 4}" text-anchor="start" font-size="11" fill="#10b981">${messagesLabel}</text>
        `;
      }).join("");

      const xLabels = dailyData.map((item, index) => {
        const shouldShow = dailyData.length <= 7 || index === 0 || index === dailyData.length - 1 || index % 2 === 0;

        if (!shouldShow) return "";

        return `
          <text x="${x(index)}" y="${height - 20}" text-anchor="middle" font-size="11" fill="#6b7280">
            ${formatDateShort(item.date)}
          </text>
        `;
      }).join("");

      const spendDots = dailyData.map((item, index) => `
        <circle cx="${x(index)}" cy="${ySpend(item.spend)}" r="3.5" fill="#1877f2" />
      `).join("");

      const messagesDots = dailyData.map((item, index) => `
        <circle cx="${x(index)}" cy="${yMessages(item.messages)}" r="3.5" fill="#10b981" />
      `).join("");

      return `
        <div class="chart-header">
          <div>
            <h3 class="chart-title">Investimento vs Leads por dia</h3>
            <p class="chart-subtitle">${formatDateBR(chartStart)} até ${formatDateBR(chartEnd)}</p>
          </div>
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-dot" style="background:#1877f2"></span>
            Investimento
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#10b981"></span>
            Leads
          </div>
        </div>

        <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Investimento e leads por dia">
          ${horizontalLines}

          <line x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${height - padding.bottom}" stroke="#d1d5db" />
          <line x1="${width - padding.right}" y1="${padding.top}" x2="${width - padding.right}" y2="${height - padding.bottom}" stroke="#d1d5db" />
          <line x1="${padding.left}" y1="${height - padding.bottom}" x2="${width - padding.right}" y2="${height - padding.bottom}" stroke="#d1d5db" />

          ${xLabels}

          <polyline points="${spendPoints}" fill="none" stroke="#1877f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          <polyline points="${messagesPoints}" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

          ${spendDots}
          ${messagesDots}

          <text x="${padding.left}" y="14" font-size="11" fill="#1877f2">Investimento</text>
          <text x="${width - padding.right}" y="14" text-anchor="end" font-size="11" fill="#10b981">Leads</text>
        </svg>
      `;
    }

    function polarToCartesian(cx, cy, r, angleInDegrees) {
      const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;

      return {
        x: cx + (r * Math.cos(angleInRadians)),
        y: cy + (r * Math.sin(angleInRadians))
      };
    }

    function describeDonutArc(cx, cy, outerRadius, innerRadius, startAngle, endAngle) {
      const startOuter = polarToCartesian(cx, cy, outerRadius, endAngle);
      const endOuter = polarToCartesian(cx, cy, outerRadius, startAngle);
      const startInner = polarToCartesian(cx, cy, innerRadius, startAngle);
      const endInner = polarToCartesian(cx, cy, innerRadius, endAngle);

      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";

      return [
        "M", startOuter.x, startOuter.y,
        "A", outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
        "L", startInner.x, startInner.y,
        "A", innerRadius, innerRadius, 0, largeArcFlag, 1, endInner.x, endInner.y,
        "Z"
      ].join(" ");
    }

    function buildDonutChart(rows) {
      const topAds = groupRowsByDimension(rows, "ad")
        .filter(item => item.messages > 0)
        .sort((a, b) => b.messages - a.messages)
        .slice(0, 5);

      if (!topAds.length) {
        return `
          <div class="chart-header">
            <div>
              <h3 class="chart-title">Top 5 anúncios por leads</h3>
              <p class="chart-subtitle">Distribuição no período selecionado</p>
            </div>
          </div>
          <div class="empty-chart">Não há leads no período selecionado.</div>
        `;
      }

      const total = topAds.reduce((sum, item) => sum + item.messages, 0);
      const cx = 120;
      const cy = 120;
      const outer = 95;
      const inner = 58;

      let currentAngle = 0;

      const arcs = topAds.map((item, index) => {
        const percentage = item.messages / total;
        const angle = percentage * 360;
        const startAngle = currentAngle;
        const endAngle = currentAngle + angle;
        currentAngle = endAngle;

        const color = CHART_COLORS[index % CHART_COLORS.length];

        if (topAds.length === 1) {
          return `
            <circle cx="${cx}" cy="${cy}" r="${outer}" fill="${color}" />
            <circle cx="${cx}" cy="${cy}" r="${inner}" fill="#ffffff" />
          `;
        }

        return `
          <path d="${describeDonutArc(cx, cy, outer, inner, startAngle, endAngle)}" fill="${color}" />
        `;
      }).join("");

      const legend = topAds.map((item, index) => {
        const color = CHART_COLORS[index % CHART_COLORS.length];
        const shortName = safeText(item.name, "Anúncio sem nome");

        return `
          <div class="donut-legend-row">
            <span class="legend-dot" style="background:${color}"></span>
            <span class="donut-name" title="${shortName}">${shortName}</span>
            <span class="donut-value">${formatNumber(item.messages)}</span>
          </div>
        `;
      }).join("");

      return `
        <div class="chart-header">
          <div>
            <h3 class="chart-title">Top 5 anúncios por leads</h3>
            <p class="chart-subtitle">Distribuição no período selecionado</p>
          </div>
        </div>

        <div class="donut-layout">
          <svg viewBox="0 0 240 240" width="210" height="210" role="img" aria-label="Top 5 anúncios por leads">
            ${arcs}
            <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="22" font-weight="bold" fill="#111827">${formatNumber(total)}</text>
            <text x="${cx}" y="${cy + 18}" text-anchor="middle" font-size="12" fill="#6b7280">leads</text>
          </svg>

          <div class="donut-legend">
            ${legend}
          </div>
        </div>
      `;
    }

    function buildDimensionButtons() {
      return `
        <div class="dimension-buttons">
          <button
            class="dimension-button ${currentDimension === "campaign" ? "active" : ""}"
            onclick="changeDimension('campaign')"
          >
            Campanhas
          </button>

          <button
            class="dimension-button ${currentDimension === "adset" ? "active" : ""}"
            onclick="changeDimension('adset')"
          >
            Conjuntos
          </button>

          <button
            class="dimension-button ${currentDimension === "ad" ? "active" : ""}"
            onclick="changeDimension('ad')"
          >
            Anúncios
          </button>
        </div>
      `;
    }

    function renderDashboard(period = currentPeriod, customStart = currentCustomStart, customEnd = currentCustomEnd) {
      const dashboard = document.getElementById("dashboard");

      currentPeriod = period;
      currentCustomStart = customStart;
      currentCustomEnd = customEnd;

      if (!dashboardData) {
        dashboard.innerHTML = `<div class="loading">Carregando dados...</div>`;
        return;
      }

      const allRows = normalizeRows(dashboardData);

      let start = null;
      let end = null;

      if (period === "custom" && customStart && customEnd) {
        start = parseDate(customStart);
        end = parseDate(customEnd);
      } else {
        const range = getPeriodRange(allRows, period);
        start = range.start;
        end = range.end;
      }

      const filteredRows = filterRowsByDate(allRows, start, end);
      const totals = calculateTotals(filteredRows);
      const dimensionConfig = getDimensionConfig(currentDimension);
      const tableRows = buildDimensionTable(filteredRows, currentDimension);

      const periodLabel = start && end
        ? `${formatDateBR(start)} até ${formatDateBR(end)}`
        : "Período não identificado";

      dashboard.innerHTML = `
        <div class="filters">
          <div class="field">
            <label>Período</label>
            <select id="periodSelect" onchange="handlePeriodChange()">
              <option value="all" ${period === "all" ? "selected" : ""}>Todo o período disponível</option>
              <option value="last_1d" ${period === "last_1d" ? "selected" : ""}>Último dia com dados</option>
              <option value="last_3d" ${period === "last_3d" ? "selected" : ""}>Últimos 3 dias</option>
              <option value="last_7d" ${period === "last_7d" ? "selected" : ""}>Últimos 7 dias</option>
              <option value="last_14d" ${period === "last_14d" ? "selected" : ""}>Últimos 14 dias</option>
              <option value="last_30d" ${period === "last_30d" ? "selected" : ""}>Últimos 30 dias</option>
              <option value="last_90d" ${period === "last_90d" ? "selected" : ""}>Últimos 90 dias</option>
              <option value="custom" ${period === "custom" ? "selected" : ""}>Personalizado</option>
            </select>
          </div>

          <div class="field">
            <label>Data inicial</label>
            <input id="customStart" type="date" value="${customStart}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <div class="field">
            <label>Data final</label>
            <input id="customEnd" type="date" value="${customEnd}" ${period !== "custom" ? "disabled" : ""} />
          </div>

          <button class="apply-button" onclick="applyFilters()">
            Aplicar
          </button>
        </div>

        <div class="status-card">
          <div>
            <strong>Última atualização:</strong>
            ${safeText(dashboardData.updated_at || dashboardData.received_at, "Ainda não informado")}
          </div>

          <div>
            <strong>Período exibido:</strong>
            ${periodLabel}
          </div>

          <div class="muted">
            ${filteredRows.length} linha(s) filtrada(s) de ${allRows.length}
          </div>
        </div>

        <div class="cards">
          <div class="card">
            <div class="label">Investimento total</div>
            <div class="value">${formatMoney(totals.spend)}</div>
            <div class="small">Soma do período selecionado</div>
          </div>

          <div class="card">
            <div class="label">Mensagens</div>
            <div class="value">${formatNumber(totals.messages)}</div>
            <div class="small">Resultados no período</div>
          </div>

          <div class="card">
            <div class="label">Custo por mensagem</div>
            <div class="value">${formatMoney(totals.cpl)}</div>
            <div class="small">Investimento dividido por mensagens</div>
          </div>

          <div class="card">
            <div class="label">Cliques</div>
            <div class="value">${formatNumber(totals.clicks)}</div>
            <div class="small">Cliques no link</div>
          </div>

          <div class="card">
            <div class="label">CTR</div>
            <div class="value">${formatPercent(totals.ctr)}</div>
            <div class="small">Cliques / impressões</div>
          </div>

          <div class="card">
            <div class="label">Impressões</div>
            <div class="value">${formatNumber(totals.impressions)}</div>
            <div class="small">Quantidade de exibições</div>
          </div>

          <div class="card">
            <div class="label">Alcance</div>
            <div class="value">${formatNumber(totals.reach)}</div>
            <div class="small">Soma do alcance diário</div>
          </div>

          <div class="card">
            <div class="label">CPM</div>
            <div class="value">${formatMoney(totals.cpm)}</div>
            <div class="small">Custo por mil impressões</div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            ${buildLineChart(filteredRows, start, end)}
          </div>

          <div class="chart-card">
            ${buildDonutChart(filteredRows)}
          </div>
        </div>

        <div class="section-header">
          <h2 class="section-title">${dimensionConfig.title}</h2>
          ${buildDimensionButtons()}
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>${buildSortableHeader("Dimensão", "name")}</th>
                <th>${buildSortableHeader("Mensagens", "messages")}</th>
                <th>${buildSortableHeader("Custo/mensagem", "cpl")}</th>
                <th>${buildSortableHeader("Cliques", "clicks")}</th>
                <th>${buildSortableHeader("CTR", "ctr")}</th>
                <th>${buildSortableHeader("Investimento", "spend")}</th>
                <th>${buildSortableHeader("Impressões", "impressions")}</th>
                <th>${buildSortableHeader("Alcance", "reach")}</th>
                <th>${buildSortableHeader("CPM", "cpm")}</th>
                <th>${buildSortableHeader("Dias", "daysCount")}</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows}
            </tbody>
          </table>
        </div>
      `;
    }

    function changeDimension(dimension) {
      currentDimension = dimension;

      sortState = {
        key: "spend",
        direction: "desc"
      };

      renderDashboard(currentPeriod, currentCustomStart, currentCustomEnd);
    }

    function getDefaultCustomRange() {
      const allRows = normalizeRows(dashboardData || {});
      const range = getPeriodRange(allRows, "last_7d");

      return {
        start: range.start ? dateKey(range.start) : "",
        end: range.end ? dateKey(range.end) : ""
      };
    }

    function handlePeriodChange() {
      const period = document.getElementById("periodSelect").value;

      if (period !== "custom") {
        renderDashboard(period, "", "");
        return;
      }

      const customStartInput = document.getElementById("customStart");
      const customEndInput = document.getElementById("customEnd");

      const defaultRange = getDefaultCustomRange();

      const start = customStartInput.value || currentCustomStart || defaultRange.start;
      const end = customEndInput.value || currentCustomEnd || defaultRange.end;

      renderDashboard("custom", start, end);
    }

    function applyFilters() {
      const period = document.getElementById("periodSelect").value;
      const customStart = document.getElementById("customStart").value;
      const customEnd = document.getElementById("customEnd").value;

      renderDashboard(period, customStart, customEnd);
    }

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="loading">Carregando dados...</div>
      `;

      try {
        const response = await fetch("/api/webhook", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Não foi possível carregar os dados do webhook.");
        }

        dashboardData = await response.json();

        renderDashboard("last_7d", "", "");
      } catch (error) {
        dashboard.innerHTML = `
          <div class="error">
            <strong>Erro ao carregar o dashboard.</strong>
            <br><br>
            ${error.message}
          </div>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
